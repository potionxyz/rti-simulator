<title>rti · reconstruction</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Instrument+Sans:wght@400;500&family=JetBrains+Mono&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --cream: #F3F1EA;
    --ink: #111010;
    --muted: #8A8680;
    --border: rgba(17,16,16,0.08);
    --topbar-bg: rgba(243,241,234,0.85);
    --social-bg: rgba(243,241,234,0.6);
    --social-bg-hover: rgba(243,241,234,1);
    --social-border-hover: rgba(17,16,16,0.15);
  }
  body {
    background: var(--cream);
    overflow: hidden;
    font-family: 'Instrument Sans', -apple-system, Helvetica, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.75rem;
    z-index: 20;
    border-bottom: 1px solid var(--border);
    background: var(--topbar-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .topbar-brand {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink);
    text-decoration: none;
  }
  .topbar-link {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
    padding: 0.4rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: var(--social-bg);
    transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
  }
  .topbar-link:hover {
    color: var(--ink);
    border-color: var(--social-border-hover);
    background: var(--social-bg-hover);
  }
  #info {
    position: fixed;
    bottom: 1.5rem;
    left: 1.75rem;
    z-index: 15;
    max-width: 480px;
  }
  #info h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 0.95rem;
    font-weight: 500;
    font-style: italic;
    color: var(--ink);
    letter-spacing: -0.005em;
    margin-bottom: 0.3rem;
  }
  #info .caption {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .timestamp {
    position: fixed;
    bottom: 1.5rem;
    right: 1.75rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    opacity: 0.35;
    letter-spacing: 0.1em;
    z-index: 15;
  }
  @media (max-width: 640px) {
    .topbar { padding: 0.85rem 1rem; }
    #info { left: 1rem; bottom: 1rem; max-width: calc(100% - 2rem); }
    .timestamp { display: none; }
  }
</style>
</head>

{
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.font = '500 50px "JetBrains Mono", monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(17,16,16,0.88)';
  const pad = 24, boxW = ctx.measureText('RECONSTRUCTION').width + pad*2, boxH = 88;
  ctx.fillRect((512-boxW)/2,(128-boxH)/2,boxW,boxH);
  ctx.strokeStyle = 'rgba(243,241,234,0.15)'; ctx.lineWidth = 2;
  ctx.strokeRect((512-boxW)/2,(128-boxH)/2,boxW,boxH);
  ctx.fillStyle = '#F3F1EA';
  ctx.fillText('RECONSTRUCTION', 256, 66);
  const tex = new THREE.CanvasTexture(canvas); tex.minFilter = THREE.LinearFilter;
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const s = new THREE.Sprite(mat); s.scale.set(1.6,0.4,1); s.renderOrder = 999;
  s.position.set(1, 2.55, 1); scene.add(s);
}

// animation loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// handle window resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

<script>
  (function(){
    const ts = document.getElementById('ts');
    if (!ts) return;
    function tick() {
      const d = new Date();
      ts.textContent = d.toISOString().slice(0, 19).replace('T',' ') + ' UTC';
    }
    tick();
    setInterval(tick, 1000);
  })();
</script>
